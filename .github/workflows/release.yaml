name: release

permissions:
  contents: write

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      version:
        description: Version to use for the packages (e.g. 1.0.0)
        required: false
        default: "0.0.0"

jobs:
  release:
    name: Package and release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install nfpm
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest

      - uses: taiki-e/install-action@just

      - name: Set version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "RELEASE_VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_VERSION=${{ github.event.inputs.version }}" >> "$GITHUB_ENV"
          fi

      - name: Build packages
        run: just build
        env:
          SEMVER: ${{ env.RELEASE_VERSION }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: packages
          path: dist/*

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ env.RELEASE_VERSION }}" \
            --draft \
            --generate-notes \
            ./dist/*

      - name: Publish to Cloudsmith
        if: startsWith(github.ref, 'refs/tags/') && env.PUBLISH_TOKEN != ''
        env:
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
          PUBLISH_REPO: ${{ secrets.PUBLISH_REPO }}
          PUBLISH_OWNER: ${{ secrets.PUBLISH_OWNER }}
        run: |
          ./ci/publish.sh --path ./dist --repo "$PUBLISH_REPO" --owner "$PUBLISH_OWNER"
